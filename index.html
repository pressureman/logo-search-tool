<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo 素材助手</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    header .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
    }

    header .title { font-weight: 600; font-size: 16px; color: #111; }
    header .subtitle { font-size: 12px; color: #6b7280; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bubble-row {
      display: flex;
      gap: 8px;
      max-width: 100%;
    }

    .bubble-row.user { flex-direction: row-reverse; }

    .bot-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .bubble {
      max-width: min(72%, 520px);
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .bubble-row.bot .bubble {
      background: #fff;
      color: #111;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,.07);
    }

    .bubble-row.user .bubble {
      background: #6366f1;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble-row.bot .bubble.loading {
      color: #9ca3af;
      font-style: italic;
    }

    .bubble img {
      display: block;
      max-width: 260px;
      max-height: 260px;
      border-radius: 10px;
      margin-top: 4px;
      cursor: pointer;
      transition: opacity .15s;
    }

    .bubble img:hover { opacity: .88; }

    .img-source {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
    }

    .download-btn {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 8px;
      background: #f3f4f6;
      color: #374151;
      cursor: pointer;
      border: none;
      text-decoration: none;
    }

    .download-btn:hover { background: #e5e7eb; }

    #input-area {
      background: #fff;
      border-top: 1px solid #e5e7eb;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #input-area textarea {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      font-family: inherit;
      color: #111;
      transition: border-color .15s;
    }

    #input-area textarea:focus { border-color: #6366f1; }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #6366f1;
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, opacity .15s;
    }

    #send-btn:hover { background: #4f46e5; }
    #send-btn:disabled { opacity: .5; cursor: default; }

    #send-btn svg { width: 18px; height: 18px; }

    /* lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
  </style>
</head>
<body>

<header>
  <div class="avatar">🎨</div>
  <div>
    <div class="title">Logo 素材助手</div>
    <div class="subtitle">告诉我你要哪个 logo，格式、颜色、尺寸都能搞</div>
  </div>
</header>

<div id="messages"></div>

<div id="input-area">
  <textarea id="msg-input" placeholder="例如：微信 logo，PNG，蓝色，512px" rows="1"></textarea>
  <button id="send-btn" title="发送">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<div id="lightbox">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  const SESSION_KEY = 'logo_session_id';
  function getSessionId() {
    let id = sessionStorage.getItem(SESSION_KEY);
    if (!id) {
      id = 'web_' + Math.random().toString(36).slice(2) + '_' + Date.now();
      sessionStorage.setItem(SESSION_KEY, id);
    }
    return id;
  }
  const sessionId = getSessionId();

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');
  const lightbox   = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addBubble(side, content, isLoading = false) {
    const row = document.createElement('div');
    row.className = 'bubble-row ' + side;

    if (side === 'bot') {
      const icon = document.createElement('div');
      icon.className = 'bot-icon';
      icon.textContent = '🎨';
      row.appendChild(icon);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (isLoading ? ' loading' : '');

    if (typeof content === 'string') {
      bubble.textContent = content;
    } else {
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      renderResponses([content], bubble);
      scrollBottom();
      return row;
    }

    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  function renderResponses(items, container) {
    items.forEach(item => {
      if (item.type === 'text') {
        const p = document.createElement('p');
        p.textContent = item.data;
        p.style.marginBottom = items.length > 1 ? '6px' : '0';
        container.appendChild(p);
      } else if (item.type === 'image') {
        const mime = item.ext === 'jpg' ? 'image/jpeg'
                   : item.ext === 'webp' ? 'image/webp'
                   : item.ext === 'svg' ? 'image/svg+xml'
                   : 'image/png';
        const src = `data:${mime};base64,${item.data}`;

        const img = document.createElement('img');
        img.src = src;
        img.alt = 'logo';
        img.addEventListener('click', () => {
          lightboxImg.src = src;
          lightbox.classList.add('open');
        });
        container.appendChild(img);

        if (item.source) {
          const src2 = document.createElement('div');
          src2.className = 'img-source';
          src2.textContent = '来源：' + item.source;
          container.appendChild(src2);
        }

        const a = document.createElement('a');
        a.className = 'download-btn';
        a.textContent = '下载';
        a.href = src;
        a.download = (item.name || 'logo') + '.' + (item.ext || 'png');
        container.appendChild(a);
      }
    });
  }

  lightbox.addEventListener('click', () => lightbox.classList.remove('open'));

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addBubble('user', text);

    const loadingRow = addBubble('bot', '搜索中…', true);

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, sessionId }),
      });

      const data = await resp.json();
      loadingRow.remove();

      const items = Array.isArray(data) ? data : [data];
      const row = document.createElement('div');
      row.className = 'bubble-row bot';

      const icon = document.createElement('div');
      icon.className = 'bot-icon';
      icon.textContent = '🎨';
      row.appendChild(icon);

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      renderResponses(items, bubble);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollBottom();

    } catch (err) {
      loadingRow.remove();
      addBubble('bot', '网络出了点问题，请稍后再试~');
      console.error(err);
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener('click', send);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // 欢迎消息
  addBubble('bot', '你好！告诉我你需要哪个品牌的 logo，可以指定格式（SVG/PNG）、颜色（如"红色"或 #FF0000）和尺寸（如 512px）~');
</script>
</body>
</html>
